name: 自动同步上游原仓库
on:
  schedule:
    # UTC 17点=北京时间凌晨1点，每日执行一次同步
    - cron: '0 17 * * *'
  # 支持网页手动点按钮立刻触发同步
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取你Fork仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置Git信息
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 绑定上游官方仓库地址
          git remote add upstream https://github.com/laoma2053/awesome-zhuiju-free.git

      - name: 拉取上游main分支、合并代码
        run: |
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          # 关键修复：强制保留本地workflows，不接受上游对yml的修改，绕过权限限制
          git checkout HEAD -- .github/workflows/
          git add .github/workflows/

      - name: 推送合并后的代码到自己仓库main分支
        run: git push https://${{ github.token }}@github.com/hzxs163/awesome-zhuiju-free.git HEAD:main
