<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>追剧免费资源汇总</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-nord-dark.css">
  <style>
    /* 主页限定隐藏多余板块 */
    [data-page="README"] .content h2:where(
      :has-text("加入追剧社群"),
      :has-text("怎么快速选择"),
      :has-text("怎么看评分"),
      :has-text("我们怎么维护"),
      :has-text("如何参与"),
      :has-text("项目原则"),
      :has-text("免责声明"),
      :has-text("Star History")
    ),
    [data-page="README"] .content h2:where(
      :has-text("加入追剧社群"),
      :has-text("怎么快速选择"),
      :has-text("怎么看评分"),
      :has-text("我们怎么维护"),
      :has-text("如何参与"),
      :has-text("项目原则"),
      :has-text("免责声明"),
      :has-text("Star History")
    ) ~ * {
      display: none !important;
    }
    /* 核心修复：禁止td单元格继承th表头文本，解决文字串扰 */
    .content table td::before,
    .content table td::after{
      content: unset !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '免费追剧资源',
      repo: '',
      loadSidebar: true,
      themeable: { defaultTheme: 'dark' },
      homepage: "README.md"
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
</body>
</html>
