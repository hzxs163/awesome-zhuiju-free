<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>追剧免费资源汇总</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-nord-dark.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '免费追剧资源',
      repo: '',
      loadSidebar: true,
      themeable: {
        defaultTheme: 'dark'
      },
      homepage: "README.md",
      afterEach() {
        const container = document.querySelector('.content');
        if(!container) return;
        // 遍历h2标题匹配并移除整块板块
        container.querySelectorAll('h2').forEach(heading=>{
          const text = heading.textContent.trim();
          if(text === "加入追剧社群" || text === "怎么快速选择"){
            let curNode = heading;
            // 循环删除标题以及后面所有同级子元素
            while(curNode){
              const next = curNode.nextElementSibling;
              curNode.remove();
              curNode = next;
            }
          }
        })
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
</body>
</html>
